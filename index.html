<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="overflow-x-hidden min-h-screen">

    <!-- Fundo decorativo -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-1/4 -left-1/4 w-1/2 h-1/2 bg-violet-600/10 blur-[140px] rounded-full"></div>
        <div class="absolute -bottom-1/4 -right-1/4 w-1/2 h-1/2 bg-cyan-600/10 blur-[140px] rounded-full"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 w-full py-6 flex justify-center z-50 opacity-0 nav-el">
        <div class="flex items-center space-x-3">
            <div class="w-9 h-9 bg-violet-600 rounded-xl flex items-center justify-center shadow-lg shadow-violet-900/30">
                <i data-lucide="scissors" class="w-5 h-5 text-white"></i>
            </div>
            <span class="text-xl font-bold tracking-tight text-white">ClipMaker</span>
        </div>
    </header>

    <main class="relative flex flex-col items-center pt-40 px-4">

        <!-- Hero -->
        <div class="text-center max-w-2xl mb-16 opacity-0 hero-el">
            <h1 class="text-5xl font-extrabold tracking-tight text-white mb-4 leading-tight">
                Transforme vídeos em <span class="text-violet-400">momentos virais</span>
            </h1>
            <p class="text-slate-400 text-lg font-medium">
                Faça upload, a IA analisa e entrega o clipe perfeito para suas redes sociais.
            </p>
        </div>

        <!-- Input API + Botão -->
        <div class="flex flex-col items-center gap-4 w-full max-w-md mb-16 opacity-0 cta-el">
            <div class="w-full relative group">
                <div class="absolute -inset-0.5 bg-gradient-to-r from-violet-600 to-cyan-600 rounded-xl opacity-20 group-hover:opacity-40 transition duration-500 blur"></div>
                <div class="relative flex items-center glass rounded-xl border border-white/10 p-1">
                    <div class="pl-4 pr-2">
                        <i data-lucide="key" class="w-5 h-5 text-slate-400"></i>
                    </div>
                    <input id="apiKey" type="password"
                        class="w-full bg-transparent text-slate-200 placeholder-slate-500 px-2 py-4 focus:outline-none text-base"
                        placeholder="Cole sua Gemini API Key...">
                </div>
            </div>

            <button id="uploadWidget"
                class="upload-btn w-full flex items-center justify-center gap-3 px-8 py-4 bg-violet-600 hover:bg-violet-500 text-white font-bold text-lg rounded-xl">
                <i data-lucide="upload" class="w-5 h-5"></i>
                <span>Fazer Upload do Vídeo</span>
            </button>

            <!-- Loading -->
            <div id="loading" class="hidden flex items-center gap-3 text-slate-400 font-medium">
                <div class="w-2 h-2 bg-violet-500 rounded-full animate-ping"></div>
                <span id="loadingText">Procurando momento viral...</span>
            </div>

            <!-- Erro -->
            <div id="error" class="hidden w-full px-5 py-3 bg-red-500/10 border border-red-500/20 text-red-400 rounded-xl text-sm font-medium">
                <div class="flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    <span id="errorMessage">Erro ao processar vídeo</span>
                </div>
            </div>
        </div>

        <!-- Player de vídeo -->
        <div class="w-full max-w-3xl opacity-0 video-el">
            <div class="glass video-glow rounded-3xl p-2 aspect-video relative overflow-hidden">
                <!-- Placeholder -->
                <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-600 transition-all duration-700">
                    <div class="shimmer absolute inset-0 opacity-10"></div>
                    <i data-lucide="play-circle" class="w-16 h-16 mb-3 stroke-1 opacity-30"></i>
                    <p class="text-sm uppercase tracking-widest opacity-40">Aguardando vídeo</p>
                </div>

                <!-- Vídeo -->
                <video id="video" src=""
                    class="hidden w-full h-full object-cover rounded-[22px] relative z-10"
                    controls></video>
            </div>
        </div>

    </main>

    <script src="js/script.js"></script>

</body>
</html>
